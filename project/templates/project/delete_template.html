{% extends 'main.html' %}

{% block content %}

            <div class="formWrapper">
                <a class="backButton" href="{% url 'account' %}"><i class="fa-solid fa-chevron-left"></i></a>
                <br>

                <form class="form" method="POST" action = "">

                    <input class="btn btn--sub btn--lg  my-md" type="submit" value="confirm" />
                </form>
            </div>
        </div>
    </main>





{% endblock content %}
